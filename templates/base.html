<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Prediksi Telur Bebek</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { background-color: #f4f6f9; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; overflow-x: hidden; }
        
        /* Desain Sidebar */
        .sidebar {
            height: 100vh;
            width: 260px;
            position: fixed;
            top: 0;
            left: 0;
            background-color: #2c3e50;
            color: white;
            padding-top: 20px;
            box-shadow: 2px 0 5px rgba(0,0,0,0.1);
            transition: all 0.3s ease; /* Animasi buka tutup */
            z-index: 1000;
        }
        /* Class saat sidebar disembunyikan */
        .sidebar.collapsed {
            left: -260px;
        }

        .sidebar .nav-link {
            color: #bdc3c7;
            padding: 15px 25px;
            font-size: 16px;
            transition: all 0.3s ease;
            border-left: 4px solid transparent;
        }
        .sidebar .nav-link:hover {
            background-color: #34495e;
            color: white;
        }
        
        /* PENANDA MENU AKTIF */
        .sidebar .nav-link.active {
            background-color: #3498db;
            color: white;
            border-left: 4px solid #ecf0f1;
            font-weight: bold;
        }
        .sidebar i { margin-right: 10px; }

        /* Area Konten Utama */
        .main-content {
            margin-left: 260px;
            min-height: 100vh;
            transition: all 0.3s ease;
        }
        /* Saat sidebar tertutup, konten melebar penuh */
        .main-content.expanded {
            margin-left: 0;
        }
        
        /* Tombol Toggle Sidebar */
        .toggle-btn {
            background: none;
            border: none;
            font-size: 24px;
            cursor: pointer;
            color: #2c3e50;
            padding: 10px 20px;
        }
        
        .content-padding { padding: 20px 40px; }
        .card { border-radius: 12px; border: none; box-shadow: 0 4px 8px rgba(0,0,0,0.05); }
    </style>
</head>
<body>

    <div class="d-flex">
        <nav class="sidebar" id="sidebar">
            <div class="text-center mb-4 px-3">
                <h4 class="fw-bold text-white mb-0">DSS Bebek</h4>
                <small class="text-info">Dashboard Admin</small>
            </div>
            <hr class="border-secondary mx-3">
            <ul class="nav flex-column mt-3">
                <li class="nav-item">
                    <a class="nav-link {% if request.path == '/' %}active{% endif %}" href="/"><i class="bi bi-speedometer2"></i> Prediksi Telur</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link {% if request.path == '/grafik' %}active{% endif %}" href="/grafik"><i class="bi bi-graph-up-arrow"></i> Grafik Produksi</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link {% if request.path == '/evaluasi' %}active{% endif %}" href="/evaluasi"><i class="bi bi-bar-chart-line"></i> Evaluasi Model</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link {% if request.path == '/cara-kerja' %}active{% endif %}" href="/cara-kerja"><i class="bi bi-gear"></i> Cara Kerja Sistem</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link {% if request.path == '/kesimpulan' %}active{% endif %}" href="/kesimpulan"><i class="bi bi-journal-check"></i> Kesimpulan Skripsi</a>
                </li>
            </ul>
        </nav>

        <main class="main-content flex-grow-1" id="mainContent">
            <div class="w-100 bg-white shadow-sm d-flex align-items-center">
                <button class="toggle-btn" id="sidebarToggle" title="Buka/Tutup Menu">
                    <i class="bi bi-list"></i>
                </button>
            </div>
            
            <div class="content-padding">
                {% block content %}
                {% endblock %}
            </div>
        </main>
    </div>

    <script>
        // Logika JavaScript untuk membuka/menutup Sidebar
        document.getElementById('sidebarToggle').addEventListener('click', function() {
            document.getElementById('sidebar').classList.toggle('collapsed');
            document.getElementById('mainContent').classList.toggle('expanded');
        });
    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
